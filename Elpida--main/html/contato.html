<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Elpida | Contato</title>

    <link rel="stylesheet" href="../css/contato.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

<header class="header">
  <div class="header-inner">
    <a class="brand" href="../html/index.html">
      <div class="brand-mark" aria-hidden="true">
        <img src="../imagem/logo-vetor.svg" alt="Logo">
      </div>
      <div class="brand-text">
        <strong>ELPIDA</strong>
        <span>Proteção & Acolhimento</span>
      </div>
    </a>

    <nav class="nav">
      <a href="../html/index.html">Início</a>
      <a href="../html/sobre.html">Sobre</a>
      <a href="crud.html">Recursos</a>
      <a class="active"href="../html/contato.html">Contato</a>
      <a href="../html/login.html">Login</a>
      <a href="../html/cadastro.html">Criar conta</a>
    </nav>
  </div>
</header>


<main class="main-content">
    <section class="contact-container">
        <div class="contact-info">
            <div class="info-content">
                <h1>Vamos conversar</h1>
                <p>
                    Caso tenha dúvidas, sugestões ou precise de apoio,
                    envie uma mensagem para nossa equipe.
                </p>
                <p>
                    Estamos disponíveis para ajudar você da melhor forma possível.
                </p>
            </div>
        </div>

        <div class="contact-form-area">
            <form class="contact-form">
                <h2>Contato</h2>
                <p class="required-text">
                    * Campos obrigatórios
                </p>
                <input type="text" placeholder="Nome *" required>
                <input type="email" placeholder="E-mail *" required>
                <input type="tel" placeholder="Telefone">
                <textarea rows="5" placeholder="Mensagem"></textarea>
                <button type="submit">Enviar</button>
            </form>
        </div>
    </section>
</main>
</body>
</html>
