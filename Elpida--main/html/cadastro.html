<header class="header">
  <div class="header-inner">
    <a class="brand" href="../html/index.html">
      <div class="brand-mark" aria-hidden="true">

  <div class="container">

    <div class="shape"></div>

    <div class="cadastro1">

      <h1>Cadastre-se</h1>

      <form>

        <label>Email</label>
        <div class="input-box">
          <input type="email" placeholder="Seu email aqui">
        </div>

        <label>Senha</label>
        <div class="input-box">
          <input type="password" placeholder="Sua senha aqui">
        </div>

        <label>Confirme a senha</label>
        <div class="input-box">
          <input type="password" placeholder="Confirme sua senha">
        </div>

        <div class="Confirmar">
          <input type="checkbox">
          <p>
            <a href="#">termos e condições</a>
          </p>
        </div>

        <button href="../html/index.html" class="criarconta-btn">
          Criar conta
        </button>

        <div class="line">
        
        </div>
        <div class="ota-buttons">
          <button type="button" class="google-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg">
            <p>Entrar com Google</p>
          </button>
          <button href="index.html" type="button" class="guest-btn">Entrar sem conta</button>
        </div>
      </form>
